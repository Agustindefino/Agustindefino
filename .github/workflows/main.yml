name: generate animation

on:
  # Rodar automaticamente a cada 24 horas (ajustado para 5 campos no cron)
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite rodar manualmente a qualquer momento pela aba Actions
  workflow_dispatch:
  
  # Roda a cada push na branch master ou main
  push:
    branches:
    - master
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o jogo da cobrinha (usando a versão v3 que é a mais estável)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Envia o arquivo gerado para a branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
